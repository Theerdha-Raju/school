{% extends 'school_app/base.html' %}

{% block content %}
  <h2>Sign Up</h2>
  <style>
    .helptext { display: none; }
  </style>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Up</button>
  </form>
  <p>Already have an account? <a href="{% url 'login' %}">Log in here</a></p>
{% endblock %}
