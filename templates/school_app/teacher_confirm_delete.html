{% extends 'school_app/base.html' %}

{% block content %}
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete the teacher "<strong>{{ teacher.first_name }} {{ teacher.last_name }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="padding: 5px 15px; background-color: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer;">Yes, delete</button>
        <a href="{% url 'teacher_list' %}" style="margin-left: 10px; color: #6c757d; text-decoration: none;">Cancel</a>
    </form>
{% endblock %}
